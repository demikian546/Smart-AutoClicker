name: Release

on:
  workflow_dispatch: # Ini penting agar tombol manual muncul

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: set NDK
      shell: bash
      run: |
        set -x
        echo "ANDROID_NDK=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

    # Langkah ini diubah menjadi build biasa (tanpa key komersial)
    # Kita buat APK versi Debug atau FDroidRelease yang tidak butuh sign eksternal
    - name: Build with Gradle
      run: |
        ./gradlew assembleDebug 
      env:
        JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"

    # Jalur file output disesuaikan dengan hasil assembleDebug
    # Ini akan mengambil file .apk dari folder output build
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: smartautoclicker-personal
        path: "**/build/outputs/apk/debug/*.apk"
